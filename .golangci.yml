version: "2"

linters:
  default: none
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - sqlclosecheck
    - noctx
    - gosec
  settings:
    govet:
      enable:
        - shadow
formatters:
  enable:
    - gofmt
    - goimports