version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - bodyclose
    - sqlclosecheck
    - noctx
    - gosec
  settings:
    govet:
      enable:
        - shadow

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: feng/delay-queue